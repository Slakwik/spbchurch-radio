# /etc/nginx/conf.d/stream.conf
#
# Optimised config for station.spbchurch.ru.
# Applies on server with:  nginx -t && systemctl reload nginx
#
# Changes vs. previous version:
#  1. HTTP/2 enabled on listen 443.
#  2. /mp3/ static delivery uses sendfile + tcp_nopush + Accept-Ranges.
#  3. limit_conn perip raised to 20 (room for stream + parallel downloads).
#  4. access_log uses an explicit file (the bare `access_log on;` was
#     a syntax noop and silently fell back to defaults).
#
# Note: HTTP/2 requires the `http2` module, which is built into nginx
# by default since 1.9.5. Confirm with `nginx -V 2>&1 | grep http_v2`.

server {
    listen 443 ssl http2;
    server_name _;

    root /var/www/html/;

    ssl_certificate     /etc/letsencrypt/live/station.spbchurch.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/station.spbchurch.ru/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubdomains; preload";

    limit_conn perip 20;
    access_log /var/log/nginx/stream.access.log;

    # ---- Icecast stream proxy ----
    location / {
        proxy_pass http://10.0.1.130:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- MP3 catalogue (static files) ----
    location /mp3/ {
        root  /media;
        index index.html;

        # Zero-copy delivery from disk to the socket — major speedup for
        # large files compared to the default user-space buffering.
        sendfile     on;
        tcp_nopush   on;

        # Allow Range requests so clients can resume / chunk downloads.
        add_header   Accept-Ranges bytes;

        # Long browser/CDN cache — the catalog is content-addressed by name.
        expires      30d;
        add_header   Cache-Control "public, max-age=2592000";
    }

    # ---- Sermon archive (same treatment as /mp3/) ----
    location /sermons/ {
        root  /media;
        index index.html;

        sendfile     on;
        tcp_nopush   on;
        add_header   Accept-Ranges bytes;

        expires      30d;
        add_header   Cache-Control "public, max-age=2592000";
    }

    # ---- Aliases for the live stream ----
    location /radio.mp3 {
        proxy_pass http://10.0.1.130:8000/radio;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /radio {
        proxy_pass http://10.0.1.130:8000/radio;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep the HTTP/1.1 long-lived chunked transfer untouched —
        # browsers/iOS expect HTTP/1.1 keep-alive for icecast streaming.
        proxy_http_version 1.1;
        proxy_buffering    off;
    }
}

# ---- Required limit_conn_zone, declared once globally ----
# Add to the http {} block in /etc/nginx/nginx.conf if not already there:
#
#   limit_conn_zone $binary_remote_addr zone=perip:10m;
#
# (10 MB stores ~160 000 unique IPs.)
